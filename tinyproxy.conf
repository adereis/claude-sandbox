# Claude Sandbox - Tinyproxy Configuration
# Whitelist-mode forward proxy for network restrictions.

Port 8888
Listen 127.0.0.1
Timeout 600

# Only allow connections from localhost
Allow 127.0.0.1
Allow ::1

# Domain whitelist filtering (deny everything not in the list)
Filter "/etc/tinyproxy/network-whitelist.conf"
FilterType ere
FilterDefaultDeny Yes

# Restrict CONNECT tunneling to HTTPS port only
ConnectPort 443

# Logging — no LogFile means output goes to stdout
LogLevel Warning

# Hide proxy identity
DisableViaHeader Yes

# Single-user proxy — keep it light
MaxClients 20
